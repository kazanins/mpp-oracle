<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Oracle — MPP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0d8cc;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas-container { position: fixed; inset: 0; z-index: 0; }
    canvas { display: block; }

    /* Loading */
    #loading {
      position: fixed; inset: 0; z-index: 100; background: #0a0a0a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .bar { display: none; }
    #loading.loading .bar { display: block; }
    #enter-btn {
      display: none; margin-top: 1.5rem; background: none; border: 1px solid #444;
      color: #e0d8cc; font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: 1rem; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 0.7rem 2.5rem; cursor: pointer; transition: border-color 0.3s, color 0.3s;
    }
    #enter-btn:hover { border-color: #e0d8cc; color: #fff; }
    #loading.ready #enter-btn { display: block; }
    #loading #load-status { display: none; }
    #loading.loading #load-status { display: block; }
    #loading-prompt {
      display: none; text-align: center; margin-top: 2.5rem; margin-bottom: 0.5rem;
    }
    #loading.ready #loading-prompt { display: block; }
    #loading-prompt .prompt-box {
      display: inline-flex; align-items: center; gap: 0.8rem;
      padding: 0.6rem 0.8rem 0.6rem 1.2rem;
      border: 1px solid #2a2a2a; border-radius: 6px; background: rgba(255,255,255,0.02);
    }
    #loading-prompt .prompt-text {
      font-family: 'Cormorant Garamond', serif; font-size: 1rem;
      color: #999; white-space: nowrap;
    }
    #loading-prompt .copy-btn {
      background: none; border: none; cursor: pointer; padding: 0.3rem;
      color: #555; transition: color 0.2s;
    }
    #loading-prompt .copy-btn:hover { color: #e0d8cc; }
    #loading-prompt .copy-btn svg { width: 16px; height: 16px; }
    #loading h1 {
      font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 2rem;
      letter-spacing: 0.15em; text-transform: uppercase; color: #e0d8cc; margin-bottom: 1.5rem;
    }
    #loading .bar { width: 200px; height: 1px; background: #333; position: relative; overflow: hidden; }
    #loading .bar::after {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 40%;
      background: #e0d8cc; animation: loadSlide 1.2s ease-in-out infinite;
    }
    @keyframes loadSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
    #load-status { margin-top: 1rem; font-size: 0.75rem; color: #666; letter-spacing: 0.05em; }

    /* Question display */
    #question-display {
      position: fixed; top: 3vh; left: 50%; transform: translateX(-50%); z-index: 10;
      text-align: center; max-width: 700px; width: 90%; pointer-events: none;
    }
    #current-question {
      font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic;
      font-size: 1.6rem; line-height: 1.4; color: #e0d8cc;
      opacity: 0; transform: translateY(10px); transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #current-question.visible { opacity: 1; transform: translateY(0); }
    #asker-name {
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: #555;
      margin-top: 0.5rem; opacity: 0; transition: opacity 0.6s ease 0.3s;
    }
    #asker-name.visible { opacity: 1; }

    /* Answer */
    #answer-display {
      position: fixed; top: 12vh; left: 50%; transform: translateX(-50%); z-index: 10;
      text-align: center; max-width: 600px; width: 90%; pointer-events: none;
    }
    #answer-text {
      font-family: 'Cormorant Garamond', serif; font-weight: 400;
      font-size: 0.85rem; line-height: 1.5; color: #c8c0b4;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #answer-text.visible { opacity: 1; }

    /* Queue */
    #queue-display {
      position: fixed; right: 2vw; top: 50%; transform: translateY(-50%);
      z-index: 10; max-width: 200px;
    }
    #queue-label {
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: #444; margin-bottom: 0.8rem;
    }
    .queue-item {
      font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.8rem;
      color: #555; padding: 0.4rem 0; border-top: 1px solid rgba(255,255,255,0.04);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Footer */
    #footer {
      position: fixed; bottom: 2vh; left: 50%; transform: translateX(-50%);
      font-size: 0.6rem; color: #444; letter-spacing: 0.05em; z-index: 10;
      text-align: center;
    }
    #footer a {
      color: #666; text-decoration: none; transition: color 0.2s;
    }
    #footer a:hover { color: #e0d8cc; }

  </style>
</head>
<body>
  <div id="loading">
    <h1>The Oracle</h1>
    <div class="bar"></div>
    <div id="load-status">Awakening...</div>
    <div id="loading-prompt">
      <div class="prompt-box">
        <span class="prompt-text">Ask the Oracle a question https://mpp-oracle.up.railway.app/llms.txt</span>
        <button class="copy-btn" onclick="navigator.clipboard.writeText('Ask the Oracle a question https://mpp-oracle.up.railway.app/llms.txt');this.innerHTML='<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;><polyline points=&quot;20 6 9 17 4 12&quot;/></svg>';setTimeout(()=>{this.innerHTML='<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;><rect x=&quot;9&quot; y=&quot;9&quot; width=&quot;13&quot; height=&quot;13&quot; rx=&quot;2&quot;/><path d=&quot;M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1&quot;/></svg>'},1500)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>
    <button id="enter-btn">Enter</button>
  </div>

  <div id="canvas-container"></div>

  <div id="question-display">
    <div id="current-question"></div>
    <div id="asker-name"></div>
  </div>

  <div id="answer-display">
    <div id="answer-text"></div>
  </div>

  <div id="queue-display">
    <div id="queue-label">Queue</div>
    <div id="queue-list"></div>
  </div>


  <div id="footer">
    Start building with <a href="https://mpp.dev" target="_blank">Machine Payments Protocol</a>. Follow <a href="https://x.com/mpp" target="_blank">@mpp</a> on X.
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
